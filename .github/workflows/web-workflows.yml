name: Build And Deploy React App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache-dependency-path: front/stock-front/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: front/stock-front

      - name: Build
        run: npm run build
        working-directory: front/stock-front

      - name: Prepare Target Directory
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            rm -rf /home/ubuntu/deploy/dist
            mkdir -p /home/ubuntu/deploy/dist

      - name: Deploy React Project To EC2
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # front/stock-front/dist 안 파일만 tar로 묶어서 target에 풀기
            cd front/stock-front
            tar czf - dist | ssh -i ${{ secrets.SSH_KEY }} ubuntu@${{ secrets.HOST }} "tar xzf - -C /home/ubuntu/deploy/dist --strip-components=1"

      - name: Restart Container
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/deploy
            docker compose restart web
